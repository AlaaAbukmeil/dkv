syntax = "proto3";
package kvstore;

service KvStore {
    rpc Get (GetRequest) returns (GetResponse);
    rpc Put (PutRequest) returns (PutResponse);
    rpc RequestVote (VoteRequest) returns (VoteResponse);
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    string value = 1;
    bool found = 2;
}

message PutRequest {
    string key = 1;
    string value = 2;
}

message PutResponse {
    bool success = 1;
}

message VoteRequest {
    uint64 term = 1;
    string candidate_id = 2;
}

message VoteResponse {
    bool vote_granted = 1;
    uint64 term = 2;
}